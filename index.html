<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SixNine Garage - Professional System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <style>
        body { background: #0f0c29; color: white; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .card-sixnine { background: #1a1a2e; padding: 30px; border-radius: 20px; width: 95%; max-width: 500px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .status-indicator { width: 150px; height: 150px; border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; border: 4px solid #444; transition: 0.5s; text-transform: uppercase; text-align: center; padding: 10px; }
        .on-style { border-color: #00ff88; color: #00ff88; box-shadow: 0 0 20px rgba(0, 255, 136, 0.3); }
        .off-style { border-color: #ff4444; color: #ff4444; box-shadow: 0 0 20px rgba(255, 68, 68, 0.3); }
        .btn-duty { height: 65px; font-weight: bold; width: 100%; border-radius: 12px; margin-top: 10px; border: none; color: white; transition: 0.3s; font-size: 1.1rem; }
        .hidden { display: none; }
        .form-control { background: #252545; border: 1px solid #444; color: white; margin-bottom: 10px; height: 50px; }
        .form-control:focus { background: #2d2d55; color: white; border-color: #00d1ff; box-shadow: none; }
    </style>
</head>
<body>

    <div class="card-sixnine text-center">
        <div id="authBox">
            <h3 class="fw-bold text-info">SIXNINE GARAGE</h3>
            <p class="text-secondary small mb-4">Mekanik Login System</p>
            
            <div id="regFields" class="hidden">
                <input type="text" id="regNama" class="form-control" placeholder="Nama Lengkap Mekanik">
            </div>
            <input type="text" id="logNama" class="form-control" placeholder="Nama Mekanik">
            <input type="password" id="pass" class="form-control" placeholder="Password PIN">

            <button onclick="handleLogin()" id="btnLogin" class="btn btn-primary w-100 mt-2">MASUK</button>
            <button onclick="handleRegister()" id="btnReg" class="btn btn-success w-100 mt-2 hidden">DAFTAR KARYAWAN</button>
            
            <a href="#" onclick="toggleAuth()" id="linkAuth" class="small d-block mt-3 text-info text-decoration-none">Daftar Karyawan Baru</a>
        </div>

        <div id="dashBox" class="hidden">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="text-start">
                    <h5 id="userName" class="fw-bold mb-0 text-info">Nama Mekanik</h5>
                    <span class="badge bg-dark text-secondary" style="font-size: 10px;">V1.2.7 EXPERT</span>
                </div>
                <button onclick="logout()" class="btn btn-sm btn-outline-danger">Keluar</button>
            </div>

            <div id="statusIcon" class="status-indicator">MEMUAT...</div>
            <h1 id="jam" class="display-6 fw-bold">00:00:00</h1>
            <p id="tgl" class="small text-secondary"></p>

            <div id="btnContainer">
                </div>
            <p id="msg" class="mt-3 small text-info"></p>
        </div>
    </div>

    <script>
        // === KONFIGURASI (JANGAN SAMPAI TERHAPUS TANDA KUTIPNYA) ===
        const firebaseConfig = {
            apiKey: "AIzaSyB3WcRHsaL5VHSSa83Z5FsVDWOJwh8aMdE",
            authDomain: "sixninegarage-absensi.firebaseapp.com",
            projectId: "sixninegarage-absensi",
            storageBucket: "sixninegarage-absensi.firebasestorage.app",
            messagingSenderId: "336451706133",
            appId: "1:336451706133:web:4d4363d052ff280cef9d1c"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const scriptURL = 'ISI_LINK_APPS_SCRIPT_GOOGLE_SHEETS_KAMU';

        // === LOGIKA AUTH ===
        function toggleAuth() {
            const isLogin = !document.getElementById('btnLogin').classList.contains('hidden');
            document.getElementById('regFields').classList.toggle('hidden');
            document.getElementById('btnLogin').classList.toggle('hidden');
            document.getElementById('btnReg').classList.toggle('hidden');
            document.getElementById('logNama').classList.toggle('hidden');
            document.getElementById('linkAuth').innerText = isLogin ? "Kembali ke Login" : "Daftar Karyawan Baru";
        }

        function formatEmail(nama) { 
            return nama.toLowerCase().replace(/\s+/g, '') + "@sixnine.com"; 
        }

        function handleRegister() {
            const nama = document.getElementById('regNama').value;
            const pass = document.getElementById('pass').value;
            if(!nama || !pass) return alert("Isi semua data!");
            
            auth.createUserWithEmailAndPassword(formatEmail(nama), pass).then(res => {
                res.user.updateProfile({ displayName: nama }).then(() => {
                    alert("Pendaftaran Berhasil! Silakan Login.");
                    location.reload();
                });
            }).catch(e => alert("Gagal Daftar: " + e.message));
        }

        function handleLogin() {
            const nama = document.getElementById('logNama').value;
            const pass = document.getElementById('pass').value;
            if(!nama || !pass) return alert("Isi Nama & PIN!");
            
            auth.signInWithEmailAndPassword(formatEmail(nama), pass).catch(e => alert("Nama atau PIN salah!"));
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('authBox').classList.add('hidden');
                document.getElementById('dashBox').classList.remove('hidden');
                document.getElementById('userName').innerText = user.displayName;
                
                const lastStatus = localStorage.getItem('status_' + user.uid) || 'OFF DUTY';
                updateUIStatus(lastStatus);
            }
        });

        // === LOGIKA UI DINAMIS (ON/OFF) ===
        function updateUIStatus(status) {
            const icon = document.getElementById('statusIcon');
            const btnContainer = document.getElementById('btnContainer');
            
            if(status === 'ON DUTY') {
                icon.innerText = "SEDANG BERTUGAS";
                icon.className = "status-indicator on-style";
                btnContainer.innerHTML = `<button onclick="kirimAbsen('OFF DUTY')" class="btn-duty" style="background: #dc3545">🌙 SELESAI TUGAS (OFF)</button>`;
            } else {
                icon.innerText = "TIDAK BERTUGAS";
                icon.className = "status-indicator off-style";
                btnContainer.innerHTML = `<button onclick="kirimAbsen('ON DUTY')" class="btn-duty" style="background: #007bff">🕒 MULAI TUGAS (ON)</button>`;
            }
        }

        function kirimAbsen(status) {
            const user = auth.currentUser;
            const msg = document.getElementById('msg');
            msg.innerText = "Mengirim data...";
            
            // Update Tampilan Langsung (Cepat)
            updateUIStatus(status);
            localStorage.setItem('status_' + user.uid, status);
            
            const data = {
                email: user.email, 
                nama: user.displayName,
                tanggal: document.getElementById('tgl').innerText,
                waktu: document.getElementById('jam').innerText, 
                status: status
            };

            fetch(scriptURL, { method: 'POST', body: JSON.stringify(data) })
            .then(() => { 
                msg.innerText = "Database Terupdate!"; 
                setTimeout(() => msg.innerText = "", 3000);
            })
            .catch(() => {
                msg.innerText = "Gagal kirim ke Sheets!";
            });
        }

        function updateJam() {
            const n = new Date();
            document.getElementById('jam').innerText = n.toLocaleTimeString('id-ID', {hour12:false});
            document.getElementById('tgl').innerText = n.toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
        }
        setInterval(updateJam, 1000);
        function logout() { auth.signOut(); location.reload(); }
    </script>
</body>
</html>
